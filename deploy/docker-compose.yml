# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Docker Compose - Indian Options Algorithmic Trading System                 ║
# ║  Deploy on AWS EC2 M8g (Graviton4) in ap-south-1 Mumbai region              ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

version: "3.9"

services:
  # ── Main Trading Application ───────────────────────────────────────────────
  trading-system:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: indian-options-algo
    restart: unless-stopped
    ports:
      - "${GRPC_PORT:-50051}:50051"
      - "8080:8080"
    volumes:
      - trading-logs:/app/logs
      - trading-data:/app/data
      - trading-models:/app/models
    environment:
      # Broker credentials (set via .env file)
      - BROKER_API_KEY=${BROKER_API_KEY:-}
      - BROKER_API_SECRET=${BROKER_API_SECRET:-}
      - BROKER_TOTP_SECRET=${BROKER_TOTP_SECRET:-}
      - BROKER_USER_ID=${BROKER_USER_ID:-}
      - BROKER_PASSWORD=${BROKER_PASSWORD:-}
      - BROKER_TYPE=${BROKER_TYPE:-zerodha}
      # Trading config
      - TRADING_CAPITAL=${TRADING_CAPITAL:-1000000}
      - MAX_DAILY_LOSS_PCT=${MAX_DAILY_LOSS_PCT:-0.02}
      - PAPER_TRADING=${PAPER_TRADING:-true}
      - DEFAULT_INDEX=${DEFAULT_INDEX:-NIFTY}
      # Infrastructure
      - GRPC_HOST=0.0.0.0
      - GRPC_PORT=50051
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - STATIC_IP=${STATIC_IP:-}
      - AWS_REGION=ap-south-1
      # ML
      - USE_GPU=false
      - MODEL_PATH=/app/models/ddqn_v3.pt
    networks:
      - trading-net
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "2"
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Redis for state caching and pub/sub ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: trading-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - trading-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ── Monitoring with Prometheus metrics ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: trading-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - trading-net
    profiles:
      - monitoring

  # ── Grafana dashboards ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: trading-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - trading-net
    profiles:
      - monitoring

volumes:
  trading-logs:
  trading-data:
  trading-models:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  trading-net:
    driver: bridge
